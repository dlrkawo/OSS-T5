server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: focus-orbit-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./server/data/focus-orbit}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
