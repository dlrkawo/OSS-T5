services:
  server:
    build:
      context: ./server
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/focus-orbit
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
    volumes:
      - ./server/data:/app/data
